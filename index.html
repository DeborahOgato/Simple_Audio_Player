<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <title>Simple_Audio_Player</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="player">
    <h2>Audio Player</h2>

    <audio id="audio">
        <source src="audio.pm3" type="audio/mpeg">
    </audio>

    <div class="controls">
        <button id="playButton">▶ Play</button>
        <button id="muteButton">🔇Mute</button>
    </div>

    <div class="volume-container">
        <label for="volume">Volume</label>
        <input type="range" id="volume" min="0" max="100" value="50">
    </div>

    <p><span id="time">00:00</span> / <span id="duration">00:00</span></p>

</div>

<script src="script.js"></script>
</body>
</html>
